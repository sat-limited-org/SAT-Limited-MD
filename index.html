<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SAT Limited MD</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0a0a0a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .bg{
      position:absolute;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left,#00ff9950,transparent 30%),
      radial-gradient(circle at bottom right,#00ff9950,transparent 30%);
      z-index:-1;
    }

    .panel{

      width:90%;
      max-width:420px;

      background:#121212;

      border:1px solid #00ff99;

      border-radius:20px;

      padding:30px;

      box-shadow:0 0 25px rgba(0,255,153,0.3);

      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      text-align:center;
      margin-bottom:25px;
    }

    .logo h1{
      color:#00ff99;
      font-size:34px;
    }

    .logo p{
      color:#aaa;
      margin-top:8px;
    }

    .status{
      text-align:center;
      margin-bottom:20px;
      color:#00ff99;
      font-weight:bold;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;
      color:#ccc;
    }

    .input-box input{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      background:#1c1c1c;

      color:white;

      outline:none;

      border:1px solid #333;
    }

    .input-box input:focus{
      border:1px solid #00ff99;
      box-shadow:0 0 10px #00ff9950;
    }

    .btn{

      width:100%;

      padding:14px;

      background:#00ff99;

      color:black;

      border:none;

      border-radius:10px;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    .btn:hover{
      background:white;
      transform:scale(1.03);
    }

    .pair-code{

      margin-top:20px;

      padding:15px;

      background:#1a1a1a;

      border-radius:10px;

      text-align:center;

      display:none;
    }

    .pair-code h2{
      color:#00ff99;
      margin-bottom:10px;
    }

    .code{

      font-size:28px;

      font-weight:bold;

      letter-spacing:5px;

      color:white;
    }

    .footer{
      margin-top:25px;
      text-align:center;
      color:#666;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="panel">

    <div class="logo">
      <h1>🤖 SAT LIMITED MD</h1>
      <p>WhatsApp Multi Device Bot</p>
    </div>

    <div class="status">
      ● SYSTEM READY
    </div>

    <!-- PHONE NUMBER -->
    <div class="input-box">

      <label>Enter WhatsApp Number</label>

      <input
        type="number"
        id="number"
        placeholder="260XXXXXXXXX"
      >

    </div>

    <!-- BUTTON -->
    <button class="btn" onclick="generateCode()">
      Generate Pair Code
    </button>

    <!-- PAIR CODE -->
    <div class="pair-code" id="pairBox">

      <h2>PAIR CODE</h2>

      <div class="code" id="code">
        ---- ----
      </div>

    </div>

    <div class="footer">
      SAT Limited © 2026
    </div>

  </div>

  <script>

async function generateCode() {

  const number =
    document.getElementById("number").value.trim()

  // validate
  if (!number) {

    alert("Enter WhatsApp number")
    return
  }

  // show loading
  document.getElementById("pairBox")
    .style.display = "block"

  document.getElementById("code")
    .innerText = "Generating..."

  try {

    const response = await fetch("/pair", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        number
      })
    })

    // parse json safely
    const data = await response.json()

    console.log(data)

    if (data.status) {

      document.getElementById("code")
        .innerText = data.code

    } else {

      document.getElementById("code")
        .innerText =
          data.message || "Failed"
    }

  } catch (err) {

    console.log(err)

    document.getElementById("code")
      .innerText = err.message
  }
}

</script>
</body>
</html>

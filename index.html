<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAT Limited MD</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
    body{background:#0a0a0a;color:white;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;}
    .bg{position:absolute;width:100%;height:100%;background:radial-gradient(circle at top left,#00ff9950,transparent 30%),radial-gradient(circle at bottom right,#00ff9950,transparent 30%);z-index:-1;}
    .panel{width:90%;max-width:420px;background:#121212;border:1px solid #00ff99;border-radius:20px;padding:30px;box-shadow:0 0 25px rgba(0,255,153,0.3);animation:fadeIn 1s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .logo{text-align:center;margin-bottom:25px;}
    .logo h1{color:#00ff99;font-size:34px;}
    .logo p{color:#aaa;margin-top:8px;}
    .status{text-align:center;margin-bottom:20px;color:#00ff99;font-weight:bold;}
    .input-box{margin-bottom:20px;}
    .input-box label{display:block;margin-bottom:8px;color:#ccc;}
    .input-box input{width:100%;padding:14px;border:none;border-radius:10px;background:#1c1c1c;color:white;outline:none;border:1px solid #333;}
    .input-box input:focus{border:1px solid #00ff99;box-shadow:0 0 10px #00ff9950;}
    .btn{width:100%;padding:14px;background:#00ff99;color:black;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.3s;margin-bottom:10px;}
    .btn:disabled{background:#555;cursor:not-allowed;}
    .btn:hover:not(:disabled){background:white;transform:scale(1.03);}
    .btn-secondary{background:#333;color:#00ff99;}
    .pair-code{margin-top:20px;padding:15px;background:#1a1a1a;border-radius:10px;text-align:center;display:none;}
    .pair-code h2{color:#00ff99;margin-bottom:10px;}
    .code{font-size:28px;font-weight:bold;letter-spacing:5px;color:white;word-break:break-word;}
    .error{color:#ff5555;margin-top:10px;font-size:14px;}
    .footer{margin-top:25px;text-align:center;color:#666;font-size:14px;}
    #qrImg{width:220px;height:220px;border-radius:12px;margin:0 auto;display:block;}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="panel">
    <div class="logo">
      <h1>🤖 SAT LIMITED MD</h1>
      <p>WhatsApp Multi Device Bot</p>
    </div>

    <div class="status" id="status">● SYSTEM READY</div>

    <div class="input-box">
      <label>Enter WhatsApp Number</label>
      <input type="text" id="number" placeholder="260XXXXXXXXX" inputmode="numeric">
    </div>

    <button class="btn" id="pairBtn" onclick="generateCode()">Generate Pair Code</button>
    <button class="btn btn-secondary" id="qrBtn" onclick="generateQR()">Use QR Code Instead</button>

    <div class="pair-code" id="pairBox">
      <h2>PAIR CODE</h2>
      <div class="code" id="code">---- ----</div>
      <div class="error" id="error"></div>
    </div>

    <div class="pair-code" id="qrBox">
      <h2>SCAN QR CODE</h2>
      <img id="qrImg">
      <p style="font-size:13px;color:#aaa;margin-top:10px">WhatsApp → Linked Devices → Scan QR</p>
    </div>

    <div class="footer"> © 2026 SAT Limited</div>
  </div>

<script>

const statusEl =
  document.getElementById("status")

async function checkStatus() {

  try {

    const res =
      await fetch("/status")

    const data =
      await res.json()

    if (data.status === "connected") {

      statusEl.innerText = "● ONLINE"
      statusEl.style.color = "#00ff99"

    } else {

      statusEl.innerText = "● OFFLINE"
      statusEl.style.color = "#ff5555"
    }

  } catch {

    statusEl.innerText = "● SERVER ERROR"
    statusEl.style.color = "#ffaa00"
  }
}

// =======================
// PAIR CODE
// =======================

async function generateCode() {

  const number =
    document.getElementById("number")
      .value
      .trim()
      .replace(/[^0-9]/g, "")

  const btn =
    document.getElementById("pairBtn")

  const pairBox =
    document.getElementById("pairBox")

  const codeEl =
    document.getElementById("code")

  const errorEl =
    document.getElementById("error")

  if (!number || number.length < 10) {

    alert("Enter a valid WhatsApp number")
    return
  }

  btn.disabled = true
  btn.innerText = "Generating..."

  pairBox.style.display = "block"

  document.getElementById("qrBox")
    .style.display = "none"

  codeEl.innerText = "PLEASE WAIT..."
  errorEl.innerText = ""

  try {

    const response =
      await fetch("/pair", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          number
        })
      })

    const data =
      await response.json()

    if (data.status) {

      codeEl.innerText =
        data.code

      errorEl.innerText =
        "WhatsApp → Linked Devices → Link with phone number"

    } else {

      codeEl.innerText = "FAILED"

      errorEl.innerText =
        data.message || "Unknown error"
    }

  } catch (err) {

    console.log(err)

    codeEl.innerText = "ERROR"

    errorEl.innerText =
      "Failed to generate pair code"

  } finally {

    btn.disabled = false

    btn.innerText =
      "Generate Pair Code"
  }
}

// =======================
// QR CODE
// =======================

async function generateQR() {

  const qrBox =
    document.getElementById("qrBox")

  const qrImg =
    document.getElementById("qrImg")

  const qrBtn =
    document.getElementById("qrBtn")

  qrBtn.disabled = true

  qrBtn.innerText =
    "Generating QR..."

  qrBox.style.display = "block"

  document.getElementById("pairBox")
    .style.display = "none"

  qrImg.src = ""

  try {

    const response =
      await fetch("/qr")

    const data =
      await response.json()

    if (data.status === "connected") {

      qrBox.innerHTML = `
        <h2 style="color:#00ff99">
          CONNECTED ✅
        </h2>
      `

      checkStatus()
      return
    }

    if (!data.qr) {
      throw new Error(
        data.error || "QR not received"
      )
    }

    qrImg.src = data.qr

    const checker =
      setInterval(async () => {

        try {

          const res =
            await fetch("/status")

          const s =
            await res.json()

          if (s.status === "connected") {

            clearInterval(checker)

            qrBox.innerHTML = `
              <h2 style="color:#00ff99">
                CONNECTED ✅
              </h2>
            `

            checkStatus()
          }

        } catch {}
      }, 3000)

  } catch (err) {

    console.log(err)

    qrBox.innerHTML = `
      <h2 style="color:#ff5555">
        QR FAILED
      </h2>

      <p style="margin-top:10px">
        ${err.message}
      </p>
    `

  } finally {

    qrBtn.disabled = false

    qrBtn.innerText =
      "Use QR Code Instead"
  }
}

// =======================
// INPUT CLEANER
// =======================

document
  .getElementById("number")
  .addEventListener("input", (e) => {

    e.target.value =
      e.target.value.replace(
        /[^0-9]/g,
        ""
      )
  })

// =======================
// AUTO STATUS
// =======================

checkStatus()

setInterval(
  checkStatus,
  10000
)

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAT Limited MD</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top left, #00ff9950, transparent 30%),
        radial-gradient(circle at bottom right, #00ff9950, transparent 30%);
      z-index: -1;
    }

    .panel {
      width: 90%;
      max-width: 420px;
      background: #121212;
      border: 1px solid #00ff99;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0, 255, 153, 0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid #00ff99;
      box-shadow: 0 0 15px rgba(0, 255, 153, 0.4);
      object-fit: cover;
      margin-bottom: 12px;
    }

    .logo h1 {
      color: #00ff99;
      font-size: 34px;
    }

    .logo p {
      color: #aaa;
      margin-top: 8px;
    }

    .status {
      text-align: center;
      margin-bottom: 20px;
      color: #00ff99;
      font-weight: bold;
      font-size: 18px;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 10px;
      border: 1px solid #00ff99;
      animation: pulse 2s infinite;
    }

    .status.online {
      color: #00ff99;
      border-color: #00ff99;
    }

    .status.offline {
      color: #ff5555;
      border-color: #ff5555;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1s infinite;
    }

    .status-dot.online {
      background: #00ff99;
    }

    .status-dot.offline {
      background: #ff5555;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .input-box {
      margin-bottom: 20px;
    }

    .input-box label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
      font-weight: bold;
    }

    .input-box input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1c1c1c;
      color: white;
      outline: none;
      border: 1px solid #333;
      font-size: 16px;
    }

    .input-box input:focus {
      border: 1px solid #00ff99;
      box-shadow: 0 0 10px #00ff9950;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #00ff99;
      color: black;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 10px;
    }

    .btn:hover:not(:disabled) {
      background: white;
      transform: scale(1.03);
    }

    .btn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #333;
      color: #00ff99;
      opacity: 0.6;
    }

    .pair-code {
      margin-top: 20px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      text-align: center;
      display: none;
      border: 1px solid #00ff99;
    }

    .pair-code.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pair-code h2 {
      color: #00ff99;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .code {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 5px;
      color: white;
      word-break: break-word;
      padding: 15px;
      background: #0a0a0a;
      border-radius: 8px;
      margin: 10px 0;
      border: 1px solid #00ff99;
    }

    .instructions {
      color: #aaa;
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.5;
    }

    .error {
      color: #ff5555;
      margin-top: 10px;
      font-size: 14px;
      padding: 10px;
      background: #2a1a1a;
      border-radius: 5px;
      border-left: 3px solid #ff5555;
    }

    .success {
      color: #00ff99;
      margin-top: 10px;
      font-size: 14px;
      padding: 10px;
      background: #1a2a1a;
      border-radius: 5px;
      border-left: 3px solid #00ff99;
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .loading {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #00ff99;
      border-radius: 50%;
      animation: loading 1.4s infinite;
      margin: 0 2px;
    }

    @keyframes loading {
      0%, 80%, 100% {
        opacity: 0;
        transform: scale(0);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="panel">

    <div class="logo">
      <img src="https://i.ibb.co/LzSgPgPf/botdp.jpg" alt="SAT Limited MD Logo">
      <h1>SAT LIMITED MD</h1>
      <p>WhatsApp Multi Device Bot</p>
    </div>

    <div class="status" id="status">
      <span class="status-dot online" id="statusDot"></span>
      <span id="statusText">CHECKING...</span>
    </div>

    <div class="input-box">
      <label>Enter WhatsApp Number</label>
      <input
        type="text"
        id="number"
        placeholder="260XXXXXXXXX"
        inputmode="numeric"
        maxlength="15"
      >
    </div>

    <button class="btn" id="pairBtn" onclick="generateCode()">
      Generate Pair Code
    </button>

    <button class="btn btn-secondary" disabled>
      Use QR Code Instead
    </button>

    <div class="pair-code" id="pairBox">
      <h2>✅ PAIRING CODE GENERATED</h2>
      <div class="code" id="code">----</div>
      <div class="instructions">
        📱 <strong>Steps:</strong><br>
        1. Open WhatsApp on your phone<br>
        2. Go to Settings → Linked Devices<br>
        3. Tap "Link with Phone Number"<br>
        4. Enter the code above
      </div>
      <div class="success" id="success"></div>
      <div class="error" id="error"></div>
    </div>

    <div class="footer">
      © 2026 SAT Limited | SAT Limited MD by SAT Limited Team
    </div>

  </div>

  <script>
    const statusEl = document.getElementById("status")
    const statusDot = document.getElementById("statusDot")
    const statusText = document.getElementById("statusText")

    async function checkStatus() {
      try {
        const res = await fetch("/status")
        const data = await res.json()

        if (data.connected) {
          statusText.innerText = "● ONLINE"
          statusEl.classList.remove("offline")
          statusEl.classList.add("online")
          statusDot.classList.remove("offline")
          statusDot.classList.add("online")
        } else {
          statusText.innerText = "● OFFLINE"
          statusEl.classList.remove("online")
          statusEl.classList.add("offline")
          statusDot.classList.remove("online")
          statusDot.classList.add("offline")
        }
      } catch (err) {
        statusText.innerText = "● SERVER ERROR"
        statusEl.classList.remove("online")
        statusEl.classList.add("offline")
      }
    }

    async function generateCode() {
      const number = document
        .getElementById("number")
        .value
        .trim()
        .replace(/[^0-9]/g, "")

      const btn = document.getElementById("pairBtn")
      const pairBox = document.getElementById("pairBox")
      const codeEl = document.getElementById("code")
      const errorEl = document.getElementById("error")
      const successEl = document.getElementById("success")

      if (!number || number.length < 10) {
        alert("❌ Enter a valid WhatsApp number (minimum 10 digits)")
        return
      }

      btn.disabled = true
      btn.innerText = "Generating Code..."
      pairBox.classList.add("show")
      codeEl.innerText = "LOADING..."
      errorEl.innerText = ""
      successEl.innerText = ""

      try {
        const response = await fetch(`/pair?number=${number}`)
        const data = await response.json()

        if (data.status) {
          codeEl.innerText = data.code
          successEl.innerText = "✅ Code generated! Enter it in your WhatsApp to link this device."
          errorEl.innerText = ""
        } else {
          codeEl.innerText = "FAILED"
          errorEl.innerText = "❌ " + (data.message || "Unknown error occurred")
          successEl.innerText = ""
        }

      } catch (err) {
        console.error("Error:", err)
        codeEl.innerText = "ERROR"
        errorEl.innerText = "❌ Server error. Try again or check console."
        successEl.innerText = ""
      } finally {
        btn.disabled = false
        btn.innerText = "Generate Pair Code"
      }
    }

    // Auto-format number input
    document.getElementById("number").addEventListener("input", (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g, "")
    })

    // Check status immediately and every 5 seconds
    checkStatus()
    setInterval(checkStatus, 5000)
  </script>

</body>

</html>
